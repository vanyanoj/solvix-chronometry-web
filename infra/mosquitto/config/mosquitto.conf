# Локальная dev-конфигурация Mosquitto.
# В проде — аутентификация по логину/паролю или сертификатам, см. mosquitto-auth-plugin.

listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# WebSocket-листенер для дашборда (фронт подписывается через MQTT-over-WS)
listener 9001
protocol websockets
allow_anonymous true
